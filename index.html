
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Blind Test Buzzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #0a0a0a;
      --surface:      #1a1a1a;
      --surface2:     #242424;
      --border:       #2e2e2e;
      --text:         #f0f0f0;
      --muted:        #777;
      --blue:         #3b82f6;
      --green:        #22c55e;
      --red:          #ef4444;
      --spotify:      #1DB954;
      --radius:       12px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 20px;
    }

    /* ── VIEWS ── */
    .view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      width: 100%;
      max-width: 420px;
    }
    .view.active { display: flex; }

    /* ── TYPOGRAPHY ── */
    .app-logo {
      font-size: 2.2rem;
      text-align: center;
      line-height: 1.2;
    }
    .app-logo small {
      display: block;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 400;
    }
    h2 { font-size: 1.3rem; font-weight: 700; }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── INPUTS ── */
    input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      padding: 13px 16px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="text"]:focus { border-color: var(--blue); }
    input[type="text"]::placeholder { color: var(--muted); }

    /* ── ROLE TOGGLE ── */
    .role-toggle {
      display: flex;
      background: var(--surface2);
      border-radius: 8px;
      padding: 3px;
    }
    .role-toggle button {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .role-toggle button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary  { background: var(--blue);    color: white; }
    .btn-spotify  { background: var(--spotify); color: white; }
    .btn-ghost    { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-sm       { padding: 10px; font-size: 0.9rem; }

    /* ── SEPARATOR ── */
    .sep { width: 100%; height: 1px; background: var(--border); }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      width: 100%;
    }

    /* ── ROOM CODE BADGE ── */
    .badge-room {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 24px;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 4px;
    }

    /* ── SPOTIFY CONNECTED ── */
    .spotify-ok {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(29,185,84,0.1);
      border: 1px solid rgba(29,185,84,0.25);
      border-radius: 8px;
      color: var(--spotify);
      font-size: 0.88rem;
      font-weight: 500;
    }

    /* ── SHARE LINK ── */
    .share-container { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    .share-label { font-size: 0.75rem; color: var(--muted); text-align: center; }
    .share-row { display: flex; gap: 8px; align-items: center; }
    .share-text {
      flex: 1;
      font-size: 0.75rem;
      color: var(--muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .share-copy {
      padding: 8px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .share-copy:hover { background: var(--border); }

    /* ── PLAYERS LIST ── */
    .players-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
    .player-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 0.35s;
    }
    .player-row.winner { border-color: var(--green); }
    .player-row.loser  { border-color: var(--red); }
    .player-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--blue);
      flex-shrink: 0;
      transition: background 0.35s;
    }
    .player-dot.green { background: var(--green); }
    .player-dot.red   { background: var(--red); }
    .player-name { flex: 1; font-size: 0.95rem; }
    .no-players { color: var(--muted); font-size: 0.9rem; text-align: center; padding: 12px 0; }

    /* ── STATUS TEXT ── */
    .status-text {
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
      min-height: 1.4em;
    }

    /* ══════════════════════════════════════
       BUZZER VIEW
    ══════════════════════════════════════ */
    #view-buzzer {
      max-width: 100%;
      height: 100dvh;
      justify-content: center;
    }

    .buzzer-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 40px 24px;
      min-height: 100dvh;
    }

    .buzzer-player-name {
      font-size: 1rem;
      color: var(--muted);
      font-weight: 500;
    }

    #buzzer-btn {
      width:  min(72vw, 280px);
      height: min(72vw, 280px);
      border-radius: 50%;
      background: var(--blue);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.55rem;
      font-weight: 900;
      color: white;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.35s cubic-bezier(.4,0,.2,1),
                  box-shadow  0.35s cubic-bezier(.4,0,.2,1),
                  transform   0.1s;
      box-shadow: 0 0 0 14px rgba(59,130,246,0.1),
                  0 0 60px  rgba(59,130,246,0.25);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    #buzzer-btn:active { transform: scale(0.93); }

    #buzzer-btn.green {
      background: var(--green);
      box-shadow: 0 0 0 18px rgba(34,197,94,0.12),
                  0 0 80px  rgba(34,197,94,0.45);
      cursor: default;
    }
    #buzzer-btn.red {
      background: var(--red);
      box-shadow: 0 0 0 14px rgba(239,68,68,0.1),
                  0 0 50px  rgba(239,68,68,0.25);
      cursor: default;
    }

    #buzzer-status {
      font-size: 1.1rem;
      text-align: center;
      font-weight: 500;
      color: var(--muted);
      min-height: 1.5em;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: #2a2a2a;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 11px 22px;
      border-radius: 100px;
      font-size: 0.88rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

<div id="toast"></div>

  <div class="buzzer-wrapper">

<!-- Firebase 9 compat (CDN) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════════════════════════════════
//  ⚙️  CONFIGURATION — À remplir avant déploiement !
// ════════════════════════════════════════════════════════════════

const SPOTIFY_CLIENT_ID = '2ae731ad8841465ca9b2664ff1e9a34e';   // 🔑 Spotify

const FIREBASE_CONFIG = {
  apiKey:            'AIzaSyB1wKfBPXkdvw7IDCVzggxHUM0efNFXK_E',
  authDomain:        'blind-test-buzzer.firebaseapp.com',
  databaseURL:       'https://blind-test-buzzer-default-rtdb.europe-west1.firebasedatabase.app',
  projectId:         'blind-test-buzzer',
  storageBucket:     'blind-test-buzzer.firebasestorage.app',
  messagingSenderId: '1081541224928',
  appId:             '1:1081541224928:web:e2874c91fa3be5bc7aa385'
};

// ════════════════════════════════════════════════════════════════
//  Constantes
// ════════════════════════════════════════════════════════════════
const REDIRECT_URI  = window.location.origin + window.location.pathname;
const SPOTIFY_SCOPE = 'user-modify-playback-state user-read-playback-state';

// ── État global
let G = {
  room: null, name: null, role: 'guesser',
  pid: null, token: null, roundPaused: false
};

// ── Firebase
firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();

// ════════════════════════════════════════════════════════════════
//  UTILITAIRES
// ════════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);

function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  $(id).classList.add('active');
}

let _toastTimer;
function toast(msg, ms = 3200) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

function uid() {
  return Math.random().toString(36).slice(2, 11) + Date.now().toString(36);
}

// ════════════════════════════════════════════════════════════════
//  SPOTIFY PKCE
// ════════════════════════════════════════════════════════════════

function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}

function genVerifier() {
  const arr = new Uint8Array(64);
  crypto.getRandomValues(arr);
  return b64url(arr.buffer);
}

async function genChallenge(v) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(v));
  return b64url(buf);
}

async function startSpotifyAuth() {
  const verifier   = genVerifier();
  const challenge  = await genChallenge(verifier);
  const ss = sessionStorage;
  ss.setItem('spv',  verifier);
  ss.setItem('sr',   G.room);
  ss.setItem('sn',   G.name);
  ss.setItem('spid', G.pid);

  const p = new URLSearchParams({
    client_id: SPOTIFY_CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    code_challenge_method: 'S256',
    code_challenge: challenge,
    scope: SPOTIFY_SCOPE
  });
  window.location.href = `https://accounts.spotify.com/authorize?${p}`;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('spv');
  if (!verifier) return null;
  const res = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      client_id: SPOTIFY_CLIENT_ID,
      grant_type: 'authorization_code',
      code,
      redirect_uri: REDIRECT_URI,
      code_verifier: verifier
    })
  });
  if (!res.ok) { console.error('Spotify error', await res.text()); return null; }
  return (await res.json()).access_token;
}

async function spotifyPause() {
  if (!G.token || G.roundPaused) return;
  G.roundPaused = true;
  try {
    const res = await fetch('https://api.spotify.com/v1/me/player/pause', {
      method: 'PUT',
      headers: { Authorization: `Bearer ${G.token}` }
    });
    if      (res.status === 204) toast('⏸ Musique mise en pause !');
    else if (res.status === 403) toast('⚠️ Spotify Premium requis pour la pause auto.');
    else if (res.status === 404) toast('⚠️ Aucun appareil Spotify actif détecté.');
    else if (res.status === 401) toast('⚠️ Session Spotify expirée — reconnecte-toi.');
  } catch (e) {
    console.error('Spotify pause error:', e);
  }
}

// ════════════════════════════════════════════════════════════════
//  FIREBASE
// ════════════════════════════════════════════════════════════════

function rRef(path) {
  return db.ref(`rooms/${G.room}${path ? '/' + path : ''}`);
}

function joinRoom() {
  const ref = rRef(`players/${G.pid}`);
  ref.set({ name: G.name, role: G.role, at: Date.now() });
  ref.onDisconnect().remove();
}

async function doBuzz() {
  // Transaction atomique : seul le premier appel réussit
  const result = await rRef('buzzedBy').transaction(cur => {
    if (cur !== null && cur !== undefined) return undefined; // abort
    return G.pid;
  });
  if (result.committed) {
    rRef('status').set('buzzed');
  }
  return result.committed;
}

async function resetRound() {
  G.roundPaused = false;
  await rRef().update({ buzzedBy: null, status: 'waiting' });
  toast('🔄 Nouvelle manche !');
}

// ════════════════════════════════════════════════════════════════
//  VUE DJ
// ════════════════════════════════════════════════════════════════

function setupDJView() {
  showView('view-dj');
  G.roundPaused = false;

  const shareUrl = `${REDIRECT_URI}?room=${G.room}`;
  $('dj-room-code').textContent   = G.room;
  $('share-link-text').textContent = shareUrl;

  $('copy-btn').onclick = () => {
    navigator.clipboard?.writeText(shareUrl)
      .then(() => toast('🔗 Lien copié !'))
      .catch(() => toast('Copie manuelle : ' + shareUrl));
  };

  if (G.token) {
    $('btn-spotify').style.display = 'none';
    $('spotify-ok').style.display  = 'flex';
  } else {
    $('btn-spotify').onclick = startSpotifyAuth;
  }

  $('reset-btn').onclick = resetRound;

  // Écoute temps réel
  rRef().on('value', snap => {
    const data     = snap.val() || {};
    const players  = data.players  || {};
    const buzzedBy = data.buzzedBy ?? null;
    const status   = data.status   || 'waiting';

    // Liste des devineurs
    const guessers = Object.entries(players).filter(([, p]) => p.role === 'guesser');
    const list = $('players-list');
    list.innerHTML = '';

    if (guessers.length === 0) {
      list.innerHTML = '<p class="no-players">En attente des joueurs…</p>';
    } else {
      guessers.forEach(([id, p]) => {
        const won  = buzzedBy === id;
        const lost = buzzedBy && buzzedBy !== id;
        const row  = document.createElement('div');
        row.className = 'player-row' + (won ? ' winner' : lost ? ' loser' : '');

        const dot = document.createElement('div');
        dot.className = 'player-dot' + (won ? ' green' : lost ? ' red' : '');

        const name = document.createElement('div');
        name.className = 'player-name';
        name.textContent = p.name;

        row.appendChild(dot);
        row.appendChild(name);
        if (won) {
          const crown = document.createElement('span');
          crown.textContent = '🏆';
          crown.style.fontSize = '1.1rem';
          row.appendChild(crown);
        }
        list.appendChild(row);
      });
    }

    // Message de statut + pause Spotify
    const statusEl = $('dj-status');
    if (status === 'buzzed' && buzzedBy && players[buzzedBy]) {
      statusEl.textContent = `🏆 ${players[buzzedBy].name} a buzzé en premier !`;
      if (G.token) spotifyPause();
    } else {
      statusEl.textContent = guessers.length > 0
        ? `${guessers.length} devineur(s) connecté(s) — prêt !`
        : '';
    }
  });
}

// ════════════════════════════════════════════════════════════════
//  VUE BUZZER (DEVINEUR)
// ════════════════════════════════════════════════════════════════

function setupBuzzerView() {
  showView('view-buzzer');
  $('buzzer-name').textContent = G.name;

  const btn    = $('buzzer-btn');
  const status = $('buzzer-status');
  let canBuzz  = true;

  btn.onclick = async () => {
    if (!canBuzz) return;
    if (navigator.vibrate) navigator.vibrate(80);
    await doBuzz();
    // L'UI sera mise à jour par le listener Firebase ci-dessous
  };

  rRef().on('value', snap => {
    const data     = snap.val() || {};
    const buzzedBy = data.buzzedBy ?? null;
    const st       = data.status   || 'waiting';

    if (!buzzedBy || st === 'waiting') {
      btn.className   = '';
      btn.textContent = 'BUZZ!';
      status.textContent = 'Écoute et buzze quand tu reconnais !';
      canBuzz = true;
    } else if (buzzedBy === G.pid) {
      btn.className   = 'green';
      btn.textContent = '🏆';
      status.textContent = 'Tu as buzzé en premier !';
      canBuzz = false;
      if (navigator.vibrate) navigator.vibrate([100, 50, 150]);
    } else {
      btn.className   = 'red';
      btn.textContent = '✗';
      status.textContent = 'Trop tard… 😅';
      canBuzz = false;
    }
  });
}

// ════════════════════════════════════════════════════════════════
//  LOGIQUE DE LA PAGE D'ACCUEIL
// ════════════════════════════════════════════════════════════════

// Pré-remplir le code de salle depuis l'URL (?room=XXX)
const urlP = new URLSearchParams(window.location.search);
if (urlP.get('room')) $('inp-room').value = urlP.get('room').toUpperCase();

// Forcer majuscules sur le code
$('inp-room').addEventListener('input', function () {
  this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
});

// Role toggle
document.querySelectorAll('.role-toggle button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.role-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    G.role = btn.dataset.role;
  };
});

// Rejoindre
$('join-btn').onclick = () => {
  const room = $('inp-room').value.trim();
  const name = $('inp-name').value.trim();
  if (!room) return toast('⚠️ Entre un code de salle');
  if (!name) return toast('⚠️ Entre ton prénom');

  G.room = room;
  G.name = name;
  G.pid  = uid();

  joinRoom();
  if (G.role === 'dj') setupDJView();
  else                  setupBuzzerView();
};

// ════════════════════════════════════════════════════════════════
//  RETOUR DEPUIS SPOTIFY OAUTH
// ════════════════════════════════════════════════════════════════

async function init() {
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  if (!code) return;

  // Nettoyer l'URL
  window.history.replaceState({}, '', window.location.pathname);

  // Restaurer la session
  const ss = sessionStorage;
  G.room   = ss.getItem('sr');
  G.name   = ss.getItem('sn');
  G.role   = 'dj';
  G.pid    = ss.getItem('spid') || uid();
  ['spv','sr','sn','spid'].forEach(k => ss.removeItem(k));

  if (!G.room || !G.name) {
    toast('❌ Session perdue — recommence depuis l\'accueil');
    return;
  }

  toast('🔄 Connexion Spotify en cours…');
  G.token = await exchangeCode(code);

  if (G.token) {
    joinRoom();
    setupDJView();
  } else {
    toast('❌ Erreur Spotify — réessaie');
  }
}

init();
</script>
</body>
</html>
